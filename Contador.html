    const DB_NAME = 'ConteoOfflineDB';
    const DB_VERSION = 1;
    let offlineDb = null;
    let isOnline = navigator.onLine;
    let pendingSyncCount = 0;

    function openOfflineDB() {
      return new Promise((resolve, reject) => {
        if (offlineDb) return resolve(offlineDb);
        const request = indexedDB.open(DB_NAME, DB_VERSION);
        request.onerror = () => reject(request.error);
        request.onsuccess = () => { offlineDb = request.result; resolve(offlineDb); };
        request.onupgradeneeded = (event) => {
          const database = event.target.result;
          if (!database.objectStoreNames.contains('sesion')) database.createObjectStore('sesion', { keyPath: 'id' });
          if (!database.objectStoreNames.contains('inventarios')) database.createObjectStore('inventarios', { keyPath: 'id' });
          if (!database.objectStoreNames.contains('zonas')) database.createObjectStore('zonas', { keyPath: 'id' });
          if (!database.objectStoreNames.contains('productos')) database.createObjectStore('productos', { keyPath: 'id' });
          if (!database.objectStoreNames.contains('conteos')) database.createObjectStore('conteos', { keyPath: 'id', autoIncrement: true });
          if (!database.objectStoreNames.contains('queue')) {
            const queueStore = database.createObjectStore('queue', { keyPath: 'id', autoIncrement: true });
            queueStore.createIndex('timestamp', 'timestamp');
          }
          if (!database.objectStoreNames.contains('metadata')) database.createObjectStore('metadata', { keyPath: 'key' });
        };
      });
    }

    async function dbGetOffline(storeName, key) {
      const database = await openOfflineDB();
      if (!database.objectStoreNames.contains(storeName)) return null;
      return new Promise((resolve, reject) => {
        const tx = database.transaction(storeName, 'readonly');
        const store = tx.objectStore(storeName);
        const request = store.get(key);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function dbGetAllOffline(storeName) {
      const database = await openOfflineDB();
      if (!database.objectStoreNames.contains(storeName)) return [];
      return new Promise((resolve, reject) => {
        const tx = database.transaction(storeName, 'readonly');
        const store = tx.objectStore(storeName);
        const request = store.getAll();
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function dbPutOffline(storeName, data) {
      const database = await openOfflineDB();
      if (!database.objectStoreNames.contains(storeName)) return null;
      return new Promise((resolve, reject) => {
        const tx = database.transaction(storeName, 'readwrite');
        const store = tx.objectStore(storeName);
        const request = store.put(data);
        request.onsuccess = () => resolve(request.result);
        request.onerror = () => reject(request.error);
      });
    }

    async function dbDeleteOffline(storeName, key) {
      const database = await openOfflineDB();
      return new Promise((resolve, reject) => {
        const tx = database.transaction(storeName, 'readwrite');
        const store = tx.objectStore(storeName);
        const request = store.delete(key);
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    async function dbClearOffline(storeName) {
      const database = await openOfflineDB();
      return new Promise((resolve, reject) => {
        const tx = database.transaction(storeName, 'readwrite');
        const store = tx.objectStore(storeName);
        const request = store.clear();
        request.onsuccess = () => resolve();
        request.onerror = () => reject(request.error);
      });
    }

    const VALID_STORES = ['sesion', 'inventarios', 'zonas', 'productos', 'conteos', 'queue', 'metadata'];

    async function cacheData(tabla, data) {
      if (!data || !Array.isArray(data)) return;
      if (!VALID_STORES.includes(tabla)) return;
      for (const item of data) {
        await dbPutOffline(tabla, { ...item, _cached: Date.now() });
      }
    }

    async function getCachedData(tabla, filterFn) {
      const all = await dbGetAllOffline(tabla);
      if (filterFn) return all.filter(filterFn);
      return all;
    }

    async function getPendingSyncCount() {
      const queue = await dbGetAllOffline('queue');
      return queue.filter(item => !item.synced).length;
    }

    function getCookie(name) {
      const match = document.cookie.match(new RegExp('(^| )' + name + '=([^;]+)'));
      return match ? match[2] : null;
    }

    function setCookie(name, value, days = 365) {
      document.cookie = `${name}=${value};path=/;max-age=${days * 24 * 60 * 60};SameSite=Lax`;
    }

    function getSesion() {
      const sesion = getCookie('sesion');
      return sesion ? JSON.parse(sesion) : null;
    }

    function clearSesion() {
      document.cookie = 'sesion=;path=/;max-age=0';
    }

    function getDeviceId() {
      let id = getCookie('device_id');
      if (!id) {
        id = 'dev_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        setCookie('device_id', id);
      }
      return id;
    }

    async function apiGet(tabla, params = '') {
      try {
        const res = await fetch(`${supabaseUrl}/rest/v1/${tabla}${params}`, {
          headers: { 'apikey': supabaseKey, 'Authorization': `Bearer ${supabaseKey}` },
          cache: 'no-store'
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const data = await res.json();
        if (data && Array.isArray(data)) await cacheData(tabla, data);
        return data;
      } catch (e) {
        console.error('API GET error, using cache:', e);
        const cached = await getCachedData(tabla);
        if (cached && cached.length > 0) {
          if (params.includes('zona_id=')) {
            const zonaId = params.match(/zona_id=eq\.(\d+)/)?.[1];
            return cached.filter(c => String(c.zona_id) === zonaId);
          }
          if (params.includes('inventario_id=')) {
            const invId = params.match(/inventario_id=eq\.(\d+)/)?.[1];
            return cached.filter(c => String(c.inventario_id) === invId);
          }
          if (params.includes('licencia_id=')) {
            const licId = params.match(/licencia_id=eq\.([^&]+)/)?.[1];
            return cached.filter(c => String(c.licencia_id) === licId);
          }
          return cached;
        }
        return [];
      }
    }

    async function apiPost(tabla, data) {
      try {
        const res = await fetch(`${supabaseUrl}/rest/v1/${tabla}`, {
          method: 'POST',
          headers: { 'apikey': supabaseKey, 'Authorization': `Bearer ${supabaseKey}`, 'Content-Type': 'application/json', 'Prefer': 'return=representation' },
          body: JSON.stringify(data),
          cache: 'no-store'
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        const result = await res.json();
        if (result && Array.isArray(result)) await cacheData(tabla, result);
        return result;
      } catch (e) {
        console.error('API POST error, queueing for sync:', e);
        const tempId = 'temp_' + Date.now() + '_' + Math.random().toString(36).substr(2, 9);
        const localItem = { ...data, id: tempId, _pendingSync: true };
        await dbPutOffline('queue', { method: 'POST', tabla, data, timestamp: Date.now(), synced: false });
        await dbPutOffline(tabla === 'conteo_producto' ? 'conteos' : tabla, localItem);
        pendingSyncCount = await getPendingSyncCount();
        notifyOfflineStatus();
        return [localItem];
      }
    }

    // FIX: Correct signature — apiPatch(tabla, params, data)
    // Previously called as apiPatch('tabla?params', '', data) which sent data to wrong URL
    async function apiPatch(tabla, params, data) {
      try {
        const res = await fetch(`${supabaseUrl}/rest/v1/${tabla}${params}`, {
          method: 'PATCH',
          headers: { 'apikey': supabaseKey, 'Authorization': `Bearer ${supabaseKey}`, 'Content-Type': 'application/json' },
          body: JSON.stringify(data),
          cache: 'no-store'
        });
        if (!res.ok) throw new Error(`HTTP ${res.status}`);
        return await res.json();
      } catch (e) {
        console.error('API PATCH error, queueing for sync:', e);
        await dbPutOffline('queue', { method: 'PATCH', tabla, params, data, timestamp: Date.now(), synced: false });
        pendingSyncCount = await getPendingSyncCount();
        notifyOfflineStatus();
        return [{ _queued: true }];
      }
    }

    function notifyOfflineStatus() {
      if (!isOnline && pendingSyncCount > 0) {
        const indicator = document.getElementById('offline-indicator');
        if (indicator) {
          indicator.textContent = `⚠ Offline · ${pendingSyncCount} pendiente${pendingSyncCount > 1 ? 's' : ''}`;
          indicator.style.display = 'flex';
        }
      }
    }

    function setupOnlineStatusListeners() {
      window.addEventListener('online', async () => {
        isOnline = true;
        const indicator = document.getElementById('offline-indicator');
        if (indicator) {
          indicator.textContent = '↻ Sincronizando...';
          indicator.style.background = '#F59E0B';
        }
        pendingSyncCount = await getPendingSyncCount();
        if (pendingSyncCount > 0 && navigator.serviceWorker.controller) {
          navigator.serviceWorker.controller.postMessage({ type: 'SYNC_NOW', supabaseUrl, supabaseKey });
        }
        setTimeout(() => {
          if (indicator) indicator.style.display = 'none';
          location.reload();
        }, 1500);
      });

      window.addEventListener('offline', () => {
        isOnline = false;
        const indicator = document.getElementById('offline-indicator');
        if (indicator) {
          indicator.textContent = '⚠ Sin conexión';
          indicator.style.background = '#EF4444';
          indicator.style.display = 'flex';
        }
      });

      if (navigator.serviceWorker.controller) {
        navigator.serviceWorker.controller.postMessage({ type: 'GET_STATUS' });
      }
    }

    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js').catch(err => console.log('SW registration failed:', err));
      navigator.serviceWorker.addEventListener('message', async (event) => {
        if (event.data && event.data.type === 'SYNC_COMPLETE') {
          pendingSyncCount = await getPendingSyncCount();
          if (pendingSyncCount === 0) {
            const indicator = document.getElementById('offline-indicator');
            if (indicator) {
              indicator.textContent = '✓ Sincronizado';
              indicator.style.background = '#10B981';
              setTimeout(() => { indicator.style.display = 'none'; }, 2000);
            }
          }
        }
        if (event.data && event.data.type === 'OFFLINE_STATUS') {
          isOnline = event.data.online;
        }
      });
    }

    setupOnlineStatusListeners();

    function exportarCSV(inv, zonas, conteos) {
      const filas = [['Zona', 'Producto', 'SKU', 'Cantidad', 'Hora']];
      conteos.forEach(c => {
        const zona = zonas.find(z => z.id === c.zona_id);
        filas.push([
          zona?.nombre || '-',
          c.nombre,
          c.sku || '-',
          c.cantidad,
          new Date(c.ts).toLocaleString('es-AR')
        ]);
      });
      const csv = filas.map(f => f.map(c => `"${c}"`).join(',')).join('\n');
      const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
      const url = URL.createObjectURL(blob);
      const link = document.createElement('a');
      link.href = url;
      link.download = `conteo_${inv?.nombre || 'inventario'}_${new Date().toISOString().split('T')[0]}.csv`;
      document.body.appendChild(link);
      link.click();
      document.body.removeChild(link);
      URL.revokeObjectURL(url);
    }

      );
    };

    const OfflineIndicator = () => {
      const [pending, setPending] = useState(0);
      const [visible, setVisible] = useState(!isOnline);

      useEffect(() => {
        const updatePending = async () => {
          const count = await getPendingSyncCount();
          setPending(count);
          if (count > 0 || !isOnline) setVisible(true);
          else setTimeout(() => setVisible(false), 2000);
        };
        updatePending();
        const interval = setInterval(updatePending, 5000);
        return () => clearInterval(interval);
      }, []);

      if (!visible && pending === 0 && isOnline) return null;

      return d('div', {
        id: 'offline-indicator',
        style: {
          position: 'fixed', top: 0, left: 0, right: 0,
          background: !isOnline ? '#EF4444' : pending > 0 ? '#F59E0B' : '#10B981',
          color: '#fff', padding: '8px 14px',

          fontSize: 12, fontWeight: 600,
          display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8, zIndex: 9999
        }
      }, !isOnline ? '⚠ Sin conexión' : pending > 0 ? `↻ ${pending} pendiente${pending > 1 ? 's' : ''} de sincronizar` : '✓ Sincronizado');
    };

      const [sub, setSub] = useState('conteo');

      const [prod, setProd] = useState(null);

      const [conteos, setConteos] = useState([]);
      const [loadingConteos, setLoadingConteos] = useState(false);
      const ultimo = conteos[0] || null;
      const [buscando, setBuscando] = useState(false);
      const [noEnc, setNoEnc] = useState(false);
      const [flash, setFlash] = useState(false);
      const [confirming, setConfirming] = useState(false);
      const [mOpen, setMOpen] = useState(false);
      const [mQ, setMQ] = useState('');

      const [mLoad, setMLoad] = useState(false);
      const [crearV, setCrearV] = useState(false);

      const [camO, setCamO] = useState(false); const [camE, setCamE] = useState(''); const [camR, setCamR] = useState(false);
      const vidRef = useRef(null); const rdrRef = useRef(null); const inpRef = useRef(null); const mInpRef = useRef(null); const debRef = useRef(null);

      useEffect(() => {
        const cargarConteos = async () => {
          if (!zona?.id) return;
          setLoadingConteos(true);
          try {
            const conteosRaw = await apiGet(`conteo_producto?zona_id=eq.${zona.id}&select=*,producto:productos(*)`);
            const conteosFormateados = (conteosRaw || []).map(c => ({
              id: c.producto_id,
              zona_id: zona.id,
              nombre: c.producto?.nombre || 'Sin nombre',
              sku: c.producto?.sku || '-',
              cantidad: c.cantidad,
              ts: new Date(c.updated_at)
            }));
            conteosFormateados.sort((a, b) => b.ts - a.ts);
            setConteos(conteosFormateados);
          } catch (e) {
            console.error('Error cargando conteos:', e);
          }
          setLoadingConteos(false);
        };
        cargarConteos();
      }, [zona?.id]);

      const tFlash = () => { setFlash(true); setTimeout(() => setFlash(false), 500) };
      const reg = (p, c, syncFn) => {
        setConteos(prev => {
          const i = prev.findIndex(x => x.id === p.id);
          if (i !== -1) { const cp = [...prev]; cp[i] = { ...cp[i], cantidad: c, ts: new Date() }; const [it] = cp.splice(i, 1); return [it, ...cp] }
          return [{ ...p, cantidad: c, ts: new Date(), zona_id: zona.id }, ...prev]
        });
        if (syncFn) syncFn();
      };

      const abrirCam = useCallback(async () => {
        setCamE(''); setCamO(true); setCamR(false);
        try {
          const stream = await navigator.mediaDevices.getUserMedia({ video: { facingMode: 'environment' } });
          setCamR(true);
          if (vidRef.current) vidRef.current.srcObject = stream;
          const mod = await loadZx();
          if (!mod) { stream.getTracks().forEach(t => t.stop()); setCamE('Error al cargar librería de escaneo.'); return; }
          const { BrowserMultiFormatReader } = mod;
          const r = new BrowserMultiFormatReader();
          rdrRef.current = r;
          r.decodeFromVideoElement(vidRef.current, (result) => {
            if (result) { cerrarCam(); procCod(result.getText()); }
          });
        } catch (e) {
          setCamE(e.name === 'NotAllowedError' ? 'Permiso de cámara denegado' : e.name === 'NotFoundError' ? 'No se encontró cámara' : e.message || 'Error de cámara.');
          setCamO(false);
        }
      }, []);

      const cerrarCam = useCallback(() => {
        rdrRef.current?.reset(); rdrRef.current = null;
        if (vidRef.current && vidRef.current.srcObject) {
          vidRef.current.srcObject.getTracks().forEach(t => t.stop());
          vidRef.current.srcObject = null;
        }
        setCamO(false); setCamR(false);
      }, []);

      useEffect(() => () => {
        rdrRef.current?.reset();
        if (vidRef.current && vidRef.current.srcObject) vidRef.current.srcObject.getTracks().forEach(t => t.stop());
      }, []);

      const procCod = useCallback(async cod => {
        if (!cod?.trim()) return;
        setBuscando(true); setNoEnc(false);
        const p = await buscarProducto(cod);
        setBuscando(false);
        if (!p) { setNoEnc(true); setTimeout(() => setNoEnc(false), 1800); return }
        if (modo === 'unitario') {
          await sl(120);
          reg(p, 1, () => guardarConteo && guardarConteo(p.id, 1, zona.id));

        } else { setProd(p); setCantidad(1); setQuery(cod) }
      }, [modo, buscarProducto, guardarConteo, zona.id]);

            modo === 'total' && prod && d('div', { className: 'sup', style: { background: '#fff', border: '1px solid #E5E7EB', padding: '22px 16px 18px', display: 'flex', flexDirection: 'column', alignItems: 'center', gap: 18 } },
              d('div', { style: { textAlign: 'center' } },
                d('div', { style: { fontWeight: 700, fontSize: 21, color: '#111827', lineHeight: 1.2 } }, prod.nombre),
                d('div', { style: { fontSize: 12, color: '#9CA3AF', marginTop: 6, fontFamily: "'DM Mono',monospace", letterSpacing: '0.04em' } }, prod.sku ? `SKU: ${prod.sku}` : 'Sin código')
              ),
              d('div', { style: { display: 'flex', alignItems: 'center' } },
                d('button', { onClick: () => setCantidad(c => Math.max(1, c - 1)), style: { width: 52, height: 52, background: G, color: '#fff', border: 'none', fontSize: 28, fontWeight: 700, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' } }, '−'),
                d('div', { style: { width: 80, height: 52, border: '2px solid #E5E7EB', borderLeft: 'none', borderRight: 'none', display: 'flex', alignItems: 'center', justifyContent: 'center', fontWeight: 700, fontSize: 28, color: '#111827' } }, cantidad),
                d('button', { onClick: () => setCantidad(c => c + 1), style: { width: 52, height: 52, background: G, color: '#fff', border: 'none', fontSize: 28, fontWeight: 700, cursor: 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center' } }, '+')
              ),
              d('button', { onClick: handleConf, disabled: confirming, style: { width: '100%', padding: '16px 0', background: confirming ? '#6EE7B7' : G, color: '#fff', border: 'none', fontWeight: 700, fontSize: 15, letterSpacing: '0.07em', textTransform: 'uppercase', cursor: confirming ? 'not-allowed' : 'pointer', display: 'flex', alignItems: 'center', justifyContent: 'center', gap: 8 } },
                d('svg', { width: 17, height: 17, viewBox: '0 0 24 24', fill: 'none', stroke: '#fff', strokeWidth: '2.5', strokeLinecap: 'square' }, d('path', { d: 'M20 6L9 17l-5-5' })),
                confirming ? 'Guardando...' : 'Confirmar Conteo'
              )
            ),
            (modo === 'unitario' || (modo === 'total' && !prod)) && d('div', { style: { background: '#fff', border: '1px solid #E5E7EB', flex: '1 0 160px', minHeight: 180, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', gap: 12, padding: 24 } },
              d('svg', { width: 40, height: 40, viewBox: '0 0 24 24', fill: 'none', stroke: '#D1D5DB', strokeWidth: '1.5', strokeLinecap: 'square' },
                modo === 'unitario' ? [d('rect', { key: 'r', x: 3, y: 3, width: 18, height: 18 }), d('path', { key: 'p', d: 'M9 3v18M15 3v18M3 9h18M3 15h18' })] : [d('path', { key: 'p', d: 'M20 7H4a2 2 0 00-2 2v6a2 2 0 002 2h16a2 2 0 002-2V9a2 2 0 00-2-2z' }), d('path', { key: 'p2', d: 'M16 3H8v4h8V3zM8 17v4M16 17v4' })]
              ),
              d('p', { style: { fontSize: 14, color: '#9CA3AF', fontWeight: 500, textAlign: 'center' } }, modo === 'unitario' ? 'Escaneá un código — suma +1 automáticamente' : 'Escaneá o buscá un producto para contar')
            )
          ),
          d('div', { style: { background: '#F9FAFB', borderTop: '1px solid #E5E7EB', padding: 14 } },
            d('div', { style: { fontSize: 11, fontWeight: 700, letterSpacing: '0.08em', textTransform: 'uppercase', color: '#6B7280', marginBottom: 10 } }, 'Último producto contado'),
            ultimo
              ? d('div', { style: { display: 'flex', alignItems: 'center', gap: 12 } },
                  d('div', { style: { background: GL, border: '1px solid #6EE7B7', width: 54, height: 54, display: 'flex', flexDirection: 'column', alignItems: 'center', justifyContent: 'center', flexShrink: 0 } },
                    d('div', { style: { fontWeight: 700, fontSize: 22, color: G, lineHeight: 1, fontFamily: "'DM Mono',monospace" } }, ultimo.cantidad),
                    d('div', { style: { fontSize: 9, color: GD, letterSpacing: '0.06em', textTransform: 'uppercase', marginTop: 2 } }, 'uds.')
                  ),
                  d('div', { style: { flex: 1, minWidth: 0 } },
                    d('div', { style: { fontWeight: 600, fontSize: 14, color: '#111827', whiteSpace: 'nowrap', overflow: 'hidden', textOverflow: 'ellipsis' } }, ultimo.nombre),
                    ultimo.sku && d('div', { style: { display: 'inline-flex', alignItems: 'center', gap: 5, marginTop: 5, background: BL, border: '1px solid #BFDBFE', padding: '3px 8px' } },
                      d('svg', { width: 11, height: 11, viewBox: '0 0 24 24', fill: 'none', stroke: B, strokeWidth: '2.5', strokeLinecap: 'square' }, d('rect', { x: 3, y: 3, width: 18, height: 18 }), d('path', { d: 'M7 7v10M10 7v10M14 7v5M17 7v5M14 15v2M17 15v2' })),
                      d('span', { style: { fontFamily: "'DM Mono',monospace", fontSize: 12, fontWeight: 500, color: B, letterSpacing: '0.06em' } }, ultimo.sku)
                    )
                  ),
                  d('div', { style: { background: GL, width: 34, height: 34, display: 'flex', alignItems: 'center', justifyContent: 'center', flexShrink: 0 } },
                    d('svg', { width: 16, height: 16, viewBox: '0 0 24 24', fill: 'none', stroke: G, strokeWidth: '2.5', strokeLinecap: 'square' }, d('path', { d: 'M20 6L9 17l-5-5' }))
                  )
                )
              : d('div', { style: { fontSize: 13, color: '#9CA3AF' } }, 'Ningún producto contado aún')
          ),
          d('div', { style: { display: 'flex', borderTop: '1px solid #E5E7EB', background: '#fff', paddingBottom: 'env(safe-area-inset-bottom,0px)' } },
            d('button', { style: { flex: 1, padding: '16px 0', background: '#F3F4F6', border: 'none', fontWeight: 700, fontSize: 13, letterSpacing: '0.05em', textTransform: 'uppercase', color: '#374151', cursor: 'pointer', borderRight: '1px solid #E5E7EB' } }, 'Guardar'),
            d('button', { onClick: () => { onZonaFinalizada && onZonaFinalizada(zona.id); onBack() }, style: { flex: 1, padding: '16px 0', background: B, border: 'none', fontWeight: 700, fontSize: 13, letterSpacing: '0.05em', textTransform: 'uppercase', color: '#fff', cursor: 'pointer' } }, 'Finalizar Zona')
          )
        )
      );
    }

    /* ════════════════════════════════════════════
       APP PRINCIPAL
    ════════════════════════════════════════════ */
    function App() {
      const [screen, setScreen] = useState('inventario');
      const [loading, setLoading] = useState(false);
      const [syncing, setSyncing] = useState(false);
      const [inv, setInv] = useState(null);
      const [inventarios, setInventarios] = useState([]);
      const [zonas, setZonas] = useState([]);
      const [zonaActiva, setZonaActiva] = useState(null);
      const [error, setError] = useState(null);
      const [todosConteos, setTodosConteos] = useState([]);

      const cargarInventario = async () => {
        setLoading(true);
        setError(null);
        try {
          const sesion = getSesion();
          if (!sesion?.licencia_id) { setError('Sesión inválida'); setLoading(false); return; }

          const licenciaActiva = await verificarLicencia(sesion.licencia_id);
          if (!licenciaActiva) { setError('Tu licencia ha expirado o está inactiva'); setLoading(false); return; }

          const inventariosData = await apiGet(`inventarios?licencia_id=eq.${sesion.licencia_id}&order=created_at.desc&limit=50`);
          if (!inventariosData || !Array.isArray(inventariosData)) { setInventarios([]); } else { setInventarios(inventariosData); }

          const inventarioAbierto = inventariosData?.find(i => i.estado === 'abierto');
          if (!inventarioAbierto) { setInv(null); setZonas([]); setLoading(false); return; }

          const zonasData = await apiGet(`zonas?inventario_id=eq.${inventarioAbierto.id}&activa=eq.true&order=orden&limit=50`);

          const conteosPromises = (zonasData || []).map(zona =>
            apiGet(`conteo_producto?zona_id=eq.${zona.id}&select=*,producto:productos(*)&limit=100`)
          );
          const conteosResults = await Promise.all(conteosPromises);

          const conteosData = [];
          (zonasData || []).forEach((zona, idx) => {
            const conteosRaw = conteosResults[idx] || [];
            (conteosRaw || []).forEach(c => {
              conteosData.push({
                id: c.producto_id, zona_id: zona.id,
                nombre: c.producto?.nombre || 'Sin nombre', sku: c.producto?.sku || '-',
                cantidad: c.cantidad, ts: new Date(c.updated_at)
              });
            });
          });

          setInv(inventarioAbierto);
          setZonas(zonasData || []);
          setTodosConteos(conteosData);

          const totalProds = (zonasData || []).reduce((sum, z) => sum + (z.total_productos || 0), 0);
          if (totalProds > 0 && inventarioAbierto.total_productos !== totalProds) {
            // FIX: correct apiPatch signature
            await apiPatch('inventarios', `?id=eq.${inventarioAbierto.id}`, { total_productos: totalProds });
          }
        } catch (e) {
          setError('Error al cargar inventario: ' + e.message);
        }
        setLoading(false);
      };

      const finalizarInventario = async () => {
        if (!inv) return;
        setSyncing(true);
        try {
          // FIX: correct apiPatch signature
          await apiPatch('inventarios', `?id=eq.${inv.id}`, { estado: 'finalizado' });
          await cargarInventario();
        } catch (e) {
          console.error('Error finalizando inventario:', e);
        }
        setSyncing(false);
      };

      const cambiarInventario = async (invId) => {
        const invSeleccionado = inventarios.find(i => i.id === parseInt(invId));
        if (!invSeleccionado) return;
        setLoading(true);
        try {
          const zonasData = await apiGet(`zonas?inventario_id=eq.${invId}&activa=eq.true&order=orden`);
          const conteosData = [];
          for (const zona of (zonasData || [])) {
            const conteosRaw = await apiGet(`conteo_producto?zona_id=eq.${zona.id}&select=*,producto:productos(*)`);
            (conteosRaw || []).forEach(c => {
              conteosData.push({
                id: c.producto_id, zona_id: zona.id,
                nombre: c.producto?.nombre || 'Sin nombre', sku: c.producto?.sku || '-',
                cantidad: c.cantidad, ts: new Date(c.updated_at)
              });
            });
          }
          setInv(invSeleccionado); setZonas(zonasData || []); setTodosConteos(conteosData); setScreen('inventario');
        } catch (e) { console.error('Error cambiando inventario:', e); }
        setLoading(false);
      };

      const buscarProducto = async (texto, esBusqueda = false) => {
        try {
          const sesion = getSesion();
          if (!sesion?.licencia_id) return esBusqueda ? [] : null;
          if (esBusqueda) {
            const data = await apiGet(`productos?licencia_id=eq.${sesion.licencia_id}&or=(nombre.ilike.%25${encodeURIComponent(texto)}%25,sku.ilike.%25${encodeURIComponent(texto)}%25)&limit=20`);
            return Array.isArray(data) ? data : [];
          } else {
            const data = await apiGet(`productos?licencia_id=eq.${sesion.licencia_id}&sku=eq.${encodeURIComponent(texto.trim())}&limit=1`);
            return Array.isArray(data) && data.length > 0 ? data[0] : null;
          }
        } catch (e) {
          console.error('Error buscando producto:', e);
          return esBusqueda ? [] : null;
        }
      };

      const guardarConteo = async (productoId, cantidad, zonaId) => {
        setSyncing(true);
        try {
          const existente = await apiGet(`conteo_producto?zona_id=eq.${zonaId}&producto_id=eq.${productoId}&select=id`);

          if (existente && existente.length > 0) {
            // FIX: apiPatch(tabla, params, data) — was passing tabla+params merged as first arg
            await apiPatch('conteo_producto', `?id=eq.${existente[0].id}`, { cantidad });
          } else {
            await apiPost('conteo_producto', { zona_id: zonaId, producto_id: productoId, cantidad });
          }

          const conteosCount = await apiGet(`conteo_producto?zona_id=eq.${zonaId}&select=id`);
          // FIX: same signature fix here
          await apiPatch('zonas', `?id=eq.${zonaId}`, { productos_contados: conteosCount.length });

          setTimeout(() => setSyncing(false), 500);
        } catch (e) {
          console.error('Error guardando conteo:', e);
          setSyncing(false);
        }
      };

      useEffect(() => {
        const sesion = getSesion();
        if (!sesion) { window.location.href = 'login.html'; return; }
        const deviceId = getDeviceId();
        fetch(`${supabaseUrl}/rest/v1/dispositivos?dispositivo_id=eq.${encodeURIComponent(deviceId)}&licencia_id=eq.${sesion.licencia_id}&select=id`, {
          headers: { 'apikey': supabaseKey, 'Authorization': `Bearer ${supabaseKey}` },
          cache: 'no-store'
        }).then(res => res.json()).then(data => {
          if (!data || data.length === 0) {
            document.cookie = 'sesion=;path=/;max-age=0';
            alert('Esta terminal no está activada para esta cuenta. Primero activá la terminal desde login.');
            window.location.href = 'login.html';
          } else { cargarInventario(); }
        }).catch(() => { cargarInventario(); });
      }, []);

      const goZonas = () => { setScreen('zonas'); setZonaActiva(null) };
      const goInventario = () => setScreen('inventario');
      const goConteo = z => { setZonaActiva(z); setScreen('conteo') };

      const handleLogout = async () => {
        if (navigator.serviceWorker && navigator.serviceWorker.controller) {
          try { navigator.serviceWorker.controller.postMessage({ type: 'CLEAR_OFFLINE_DATA' }); } catch (e) {}
        }
        if (window.indexedDB && typeof window.indexedDB.deleteDatabase === 'function') {
          try { window.indexedDB.deleteDatabase('ConteoOfflineDB'); } catch (e) {}
        }
        clearSesion();
        window.location.href = 'login.html';
      };

      const handleCrearZona = async (zona) => {
        try {
          const data = await apiPost('zonas', {
            inventario_id: inv.id, nombre: zona.nombre,
            descripcion: zona.descripcion || null,
            productos_contados: 0, total_productos: 0,
            finalizada: false, activa: true
          });
          if (data && data.length > 0) setZonas(prev => [...prev, data[0]]);
        } catch (e) { console.error('Error creando zona:', e); }
      };

      const finZona = async (id) => {
        try {
          // FIX: correct apiPatch signature
          await apiPatch('zonas', `?id=eq.${id}`, { finalizada: true });
          setZonas(prev => prev.map(z => z.id === id ? { ...z, finalizada: true } : z));
        } catch (e) { console.error('Error finalizando zona:', e); }
      };

      if (screen === 'inventario') return d(Fragment, null, h(OfflineIndicator), h(InventarioScreen, { inv, zonas, loading, syncing, inventarios, onEntrar: goZonas, onLogout: handleLogout, onCambiarInv: cambiarInventario, onFinalizarInv: finalizarInventario }));
      if (screen === 'zonas') return d(Fragment, null, h(OfflineIndicator), h(ZonasScreen, { inv, zonas, loading, onBack: goInventario, onZonaSelect: goConteo, onCrearZona: handleCrearZona }));
      if (screen === 'conteo' && zonaActiva) return d(Fragment, null, h(OfflineIndicator), h(ConteoScreen, { zona: zonaActiva, inv, zonas, conteos: todosConteos, onBack: goZonas, onZonaFinalizada: finZona, buscarProducto, guardarConteo, crearProducto: null }));
      return null;
    }

    createRoot(document.getElementById('root')).render(h(App, null));

    document.addEventListener('touchstart', (e) => {
      if (window.scrollY === 0) window.touchStartY = e.touches[0].clientY;
    });
    document.addEventListener('touchmove', (e) => {
      if (window.touchStartY && window.scrollY === 0) {
        const pullDistance = e.touches[0].clientY - window.touchStartY;
        if (pullDistance > 80) { window.touchStartY = 0; location.reload(); }
      }
    });
    document.addEventListener('touchend', () => { window.touchStartY = 0; });
  </script>
</body>
